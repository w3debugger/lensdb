name: Bug report
description: Report a problem with LensDB
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the fields below so we can reproduce and fix the issue quickly.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the bug.
      placeholder: |
        1. Open LensDB
        2. Connect to ...
        3. Click ...
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behaviour
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
  - type: dropdown
    id: database-engine
    attributes:
      label: Database engine
      description: Which database engine were you using?
      options:
        - PostgreSQL
        - MySQL/MariaDB
        - Both
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      description: The macOS version you are running.
      placeholder: e.g. 14.5
    validations:
      required: true
  - type: input
    id: lensdb-version
    attributes:
      label: LensDB version
      description: The version of LensDB you are running.
  - type: textarea
    id: logs
    attributes:
      label: Logs / error text
      description: Paste any relevant logs or error output. This will be rendered as code.
      render: shell
